
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="800" height="200" rx="20" fill="url(#bgGradient)" />
  
  <rect x="30" y="30" width="740" height="140" rx="15" fill="rgba(255,255,255,0.15)" />
  <rect x="30" y="30" width="740" height="140" rx="15" fill="url(#accentGradient)" />
  
  <circle cx="130" cy="100" r="50" fill="#fff" filter="url(#shadow)" />
  <circle cx="130" cy="100" r="45" fill="url(#bgGradient)" />
  
  <text x="130" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">V</text>
  
  <g transform="translate(220, 70)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">veyvin</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Full Stack Developer | Tech Enthusiast</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Building amazing things with code 🚀</text>
  </g>
  
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="150" height="25" rx="12" fill="rgba(255,255,255,0.2)" />
    <text x="75" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">🌍 Shanghai, China</text>
  </g>
  
  <g transform="translate(600, 95)">
    <rect x="0" y="0" width="150" height="25" rx="12" fill="rgba(255,255,255,0.2)" />
    <text x="75" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">📧 hello@veyvin.dev</text>
  </g>
  
  <g transform="translate(600, 130)">
    <rect x="0" y="0" width="150" height="25" rx="12" fill="rgba(255,255,255,0.2)" />
    <text x="75" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">💻 veyvin.dev</text>
  </g>
  
  <g transform="translate(220, 140)">
    <circle cx="0" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">✨</text>
    
    <circle cx="35" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <text x="35" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">🎨</text>
    
    <circle cx="70" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <text x="70" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">🚀</text>
    
    <circle cx="105" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <text x="105" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">💡</text>
    
    <circle cx="140" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <text x="140" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">🎯</text>
  </g>
  
  <circle cx="770" cy="30" r="15" fill="rgba(255,255,255,0.1)" />
  <text x="770" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">💎</text>
</svg>
